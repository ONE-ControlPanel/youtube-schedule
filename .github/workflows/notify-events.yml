name: 予約投稿・公開をChatWorkに自動報告

on:
  # 30分ごとにチェック
  schedule:
    - cron: '*/30 * * * *'
  # 手動実行（テスト用にルームIDを上書き可能）
  workflow_dispatch:
    inputs:
      test_room:
        description: 'テスト送信先ルームID（空欄なら本番ルーム）'
        required: false
        default: ''

permissions:
  contents: write

# 前の実行が終わるまで次を待たせる（状態ファイルの競合防止）
concurrency:
  group: notify-events
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 予約・公開を検知してChatWorkへ報告
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ github.event.inputs.test_room || secrets.CHATWORK_ROOM_ID }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: python scripts/notify_events.py

      - name: 通知済み記録をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notify_state.json
          if git diff --staged --quiet; then
            echo "変更なし - スキップ"
          else
            git commit -m "chore: 通知済み記録を更新 [skip ci]"
            git pull --rebase origin main
            git push
          fi
