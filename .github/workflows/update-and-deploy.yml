name: データを毎日自動更新（CSV＋YouTubeアナリティクス）

on:
  # 毎日 午前3時（日本時間）に自動実行 = UTC 18:00
  schedule:
    - cron: '0 18 * * *'
  # 手動実行ボタン
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: GoogleスプレッドシートからCSVを取得してindex.htmlを更新
        run: python scripts/update_csv.py

      - name: YouTubeアナリティクスデータを更新
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: python scripts/update_analytics.py

      # GitHub Pagesはmainブランチから直接配信されているため、
      # コミット＆プッシュするだけで自動的にサイトへ反映される
      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if [ -d data ]; then git add data; fi
          if git diff --staged --quiet; then
            echo "変更なし - スキップ"
          else
            git commit -m "chore: スケジュールCSVとアナリティクスデータを自動更新"
            git pull --rebase origin main
            git push
          fi
