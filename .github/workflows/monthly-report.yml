name: 月間レポートをChatWorkに自動送信

on:
  # 毎月30日 朝10時（日本時間）= 当月分のレポートを送信（UTC 1:00）
  # 2月は30日が存在しないため28日に送信する
  schedule:
    - cron: '0 1 30 1,3-12 *'
    - cron: '0 1 28 2 *'
  # 手動実行（対象月を指定可能）
  workflow_dispatch:
    inputs:
      report_month:
        description: '対象月（例: 2026-06）。空欄なら前月'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  send-monthly-report:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 月間レポートを生成してChatWorkへ送信
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          REPORT_MONTH: ${{ github.event.inputs.report_month }}
          # YouTube Studio連携（OAuth）- 未設定でも公開データのみで動作する
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YT_OAUTH_CLIENT_ID: ${{ secrets.YT_OAUTH_CLIENT_ID }}
          YT_OAUTH_CLIENT_SECRET: ${{ secrets.YT_OAUTH_CLIENT_SECRET }}
          YT_OAUTH_REFRESH_TOKEN: ${{ secrets.YT_OAUTH_REFRESH_TOKEN }}
        run: python scripts/monthly_report.py
